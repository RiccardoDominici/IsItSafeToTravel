name: SEO IndexNow Submission

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  index-now:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy scores to public
        run: |
          if [ -f "data/scores/latest.json" ]; then
            cp data/scores/latest.json public/scores.json
          fi

      - name: Build site
        run: npm run build

      - name: Extract URLs from sitemap and submit to IndexNow
        run: |
          SITEMAP_INDEX="dist/client/sitemap-index.xml"

          if [ ! -f "$SITEMAP_INDEX" ]; then
            echo "::error::Sitemap index not found at $SITEMAP_INDEX"
            exit 1
          fi

          # Read per-language sitemap filenames from the sitemap index
          SITEMAP_FILES=$(grep -oP '(?<=<loc>)[^<]+' "$SITEMAP_INDEX" | sed 's|https://isitsafetotravel.org/|dist/client/|')

          if [ -z "$SITEMAP_FILES" ]; then
            echo "::error::No sitemaps found in $SITEMAP_INDEX"
            exit 1
          fi

          echo "Found $(echo "$SITEMAP_FILES" | wc -l | tr -d ' ') sitemap files in index"
          echo "$SITEMAP_FILES"

          # Extract <loc> URLs from every per-language sitemap and concatenate
          ALL_URLS_FILE=$(mktemp)
          while IFS= read -r SITEMAP_FILE; do
            [ -z "$SITEMAP_FILE" ] && continue
            if [ ! -f "$SITEMAP_FILE" ]; then
              echo "::warning::Sitemap referenced but missing: $SITEMAP_FILE"
              continue
            fi
            FILE_COUNT=$(grep -oP '(?<=<loc>)[^<]+' "$SITEMAP_FILE" | tee -a "$ALL_URLS_FILE" | wc -l | tr -d ' ')
            echo "  $SITEMAP_FILE: $FILE_COUNT URLs"
          done <<< "$SITEMAP_FILES"

          URLS=$(sed '/^$/d' "$ALL_URLS_FILE")
          rm -f "$ALL_URLS_FILE"
          URL_COUNT=$(echo "$URLS" | wc -l | tr -d ' ')

          echo "Found $URL_COUNT URLs in sitemap"
          echo "$URLS"

          # Build JSON array of URLs
          URL_JSON=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          # Submit in batches of 10,000
          BATCH_SIZE=10000
          TOTAL=$(echo "$URL_JSON" | jq 'length')
          OFFSET=0

          while [ "$OFFSET" -lt "$TOTAL" ]; do
            BATCH=$(echo "$URL_JSON" | jq --argjson offset "$OFFSET" --argjson size "$BATCH_SIZE" '.[$offset:$offset+$size]')
            BATCH_COUNT=$(echo "$BATCH" | jq 'length')

            echo "Submitting batch of $BATCH_COUNT URLs (offset $OFFSET)..."

            PAYLOAD=$(jq -n \
              --arg host "isitsafetotravel.org" \
              --arg key "b4f7e2a1d9c8365f" \
              --arg keyLocation "https://isitsafetotravel.org/b4f7e2a1d9c8365f.txt" \
              --argjson urlList "$BATCH" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

            echo "Payload:"
            echo "$PAYLOAD" | jq .

            # Submit to IndexNow via api.indexnow.org
            HTTP_STATUS=$(curl -s -o /tmp/indexnow-response.txt -w "%{http_code}" \
              -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")

            RESPONSE=$(cat /tmp/indexnow-response.txt)
            echo "IndexNow response: HTTP $HTTP_STATUS"
            echo "$RESPONSE"

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "Batch submitted successfully"
            else
              echo "::warning::IndexNow returned HTTP $HTTP_STATUS for batch at offset $OFFSET"
            fi

            OFFSET=$((OFFSET + BATCH_SIZE))
          done

      - name: Ping Google sitemap
        run: |
          echo "Pinging Google with sitemap URL..."
          curl -s "https://www.google.com/ping?sitemap=https://isitsafetotravel.org/sitemap-index.xml"
          echo ""
          echo "Google sitemap ping complete"
